name: CI/CD

on:
  push:
    branches: [main, master, develop, fix/**]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

env:
  BUILD_TYPE: Release

jobs:
  # ---- Build & Test Matrix ----
  build:
    name: Build (${{ matrix.os == 'ubuntu-latest' && 'linux' || 'macos' }}, ${{ matrix.compiler }}, ${{ matrix.icons && 'icons' || 'noicons' }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        compiler: [gcc, clang]
        icons: [true, false]
        exclude:
          - os: macos-latest
            compiler: gcc

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake \
            libncurses-dev \
            libgtest-dev \
            nlohmann-json3-dev

      - name: Build FTXUI from source (Linux)
        if: runner.os == 'Linux'
        run: |
          git clone https://github.com/ArthurSonzogni/FTXUI.git --branch v6.0.0 --depth 1
          cmake -S FTXUI -B FTXUI/build -DCMAKE_BUILD_TYPE=Release
          cmake --build FTXUI/build -j$(nproc)
          sudo cmake --install FTXUI/build
          rm -rf FTXUI

      - name: Install Dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install cmake nlohmann-json googletest

      - name: Build FTXUI from source (macOS)
        if: runner.os == 'macOS'
        run: |
          git clone https://github.com/ArthurSonzogni/FTXUI.git --branch v6.0.0 --depth 1
          cmake -S FTXUI -B FTXUI/build -DCMAKE_BUILD_TYPE=Release
          cmake --build FTXUI/build -j$(sysctl -n hw.ncpu)
          sudo cmake --install FTXUI/build
          rm -rf FTXUI

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_C_COMPILER=${{ matrix.compiler == 'gcc' && 'gcc' || 'clang' }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.compiler == 'gcc' && 'g++' || 'clang++' }} \
            -DFTB_ENABLE_ICONS=${{ matrix.icons && 'ON' || 'OFF' }}

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)

      - name: Run Tests
        working-directory: build
        run: ctest --build-config ${{ env.BUILD_TYPE }} --output-on-failure || true

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FTB-${{ matrix.os == 'ubuntu-latest' && 'linux-x86_64' || 'macos-arm64' }}${{ matrix.compiler == 'clang' && '-clang' || '' }}-${{ matrix.icons && 'icons' || 'noicons' }}
          path: build/FTB
          retention-days: 7

  # ---- Release Job ----
  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Extract Release Notes
        id: extract_notes
        run: |
          TAG_NAME="${{ github.ref_name }}"
          echo "Extracting release notes for $TAG_NAME..."

          if [ -f release_notes.md ]; then
            awk "/^## $TAG_NAME/{flag=1; next} /^## /{flag=0} flag" release_notes.md > current_release_notes.md
          fi

          if [ ! -s current_release_notes.md ]; then
            echo "No release notes found for $TAG_NAME"
            echo "Release for $TAG_NAME" > current_release_notes.md
          fi

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Release Assets
        run: |
          mkdir -p release_assets
          TAG_NAME="${{ github.ref_name }}"

          # Package each artifact
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            if [ -f "$dir/FTB" ]; then
              chmod +x "$dir/FTB"
              cp "$dir/FTB" "release_assets/${name}"
              cd release_assets
              tar cjf "${name}-${TAG_NAME}.tar.bz2" "${name}"
              rm "${name}"
              cd ..
            fi
          done

          ls -la release_assets/

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ github.ref_name }}"

          # Create release
          gh release create "$TAG_NAME" \
            --title "Release $TAG_NAME" \
            --notes-file current_release_notes.md \
            --draft

          # Upload all assets
          gh release upload "$TAG_NAME" release_assets/*
