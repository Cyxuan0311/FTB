name: Feature Request
description: Suggest an idea for FTB
title: "[Feature] "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe what you'd like to see added to FTB.

  - type: dropdown
    id: module
    attributes:
      label: Related Module
      description: Which part of FTB is your feature related to?
      options:
        - File browsing / navigation
        - File preview
        - Plugin system
        - AI assistant
        - SSH remote connections
        - Built-in editor
        - Theme / appearance
        - Keybindings
        - Performance
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Is your feature request related to a problem? Please describe what you're trying to achieve.
      placeholder: "I'm always frustrated when [...] because [...]"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: A clear and concise description of what you want to happen.
      placeholder: "I would like FTB to [...]"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or features you've considered?
      placeholder: "I've tried using [...] but it doesn't work because [...]"

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: |
        Add any other context, references, or screenshots about the feature request here.
        For example, if another file manager (ranger, lf, yazi, nnn) has this feature, mention it.
      placeholder: "ranger has a similar feature where [...]"
